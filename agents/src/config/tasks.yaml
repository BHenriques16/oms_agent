count_task:
  description: >
    Your objective is to answer the following USER QUERY: "{query}"

    INSTRUCTIONS:
    1. Use the 'count_offenders' tool.
    2. Read the query carefully and extract only the relevant filter.

    EXAMPLES OF HOW TO THINK AND MAP DATA:
    - If Query is "How many Black offenders are there?":
      Pass race="Black", leave education_level and gang_affiliated empty.
    - If Query is "Count offenders with a High School Diploma":
      Pass education_level="High School Diploma", leave race and gang_affiliated empty.
    - If Query is "Are there any gang members?":
      Pass gang_affiliated="1", leave race and education_level empty.
    - If Query is "How many offenders total?":
      Leave ALL fields empty.

    CRITICAL RULES FOR YOUR FINAL ANSWER:
    - NEVER guess the number. You MUST wait for the tool's response.
    - You MUST write a fluent, human-like conversational sentence.
    - You MUST ALWAYS start your final answer with the exact words: "Based on the database, I found a total of..."
    - If the tool returns 0, output exactly: "Based on the database, I found a total of 0."
    - NEVER repeat the prompt, the instructions, or the user's query.
  expected_output: "A short sentence stating the exact total count, starting with 'Based on the database...'."
  agent: count_specialist