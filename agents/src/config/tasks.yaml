# Task configurations for local agents with small LLMs (8B) - Optimized for Qwen 2.5 / Llama 3.1

demographics_task:
  description: >
    Your objective is to answer the following USER QUERY: "{query}"

    INSTRUCTIONS:
    1. Use the 'get_offenders_demographics' tool to retrieve the data.
    2. Filter the tool's data to extract ONLY the details requested.

    CRITICAL RULES FOR YOUR FINAL ANSWER:
    - IF THE TOOL RETURNS "No records found.", your EXACT and ONLY output must be: "No records found for this ID."
    - You MUST write a fluent, human-like conversational sentence.
    - You MUST ALWAYS start your final answer with the exact words: "Based on the records, the offender..."
    - Integrate the extracted data smoothly into the sentence (e.g., "...is a white male with a high school diploma.").
    - NEVER repeat the prompt, the instructions, or the user's query.
  expected_output: "A direct conversational sentence starting with 'Based on the records...'."
  agent: demographics_specialist

